<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Garage Manifest</title>
<meta name="description" content="Ta collection de voitures façon Pokédex : photographie, complète par rareté et par marque." />
<meta name="theme-color" content="#0b0b0d" />

<!-- PWA / iOS -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="apple-touch-icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Garage" />

<style>
  :root{
    --bg:#0b0b0d; --panel:#161618; --panel2:#111113; --line:#27272a; --line2:#3f3f46;
    --txt:#f4f4f5; --fg:#f4f4f5; --muted:#a1a1aa; --muted2:#71717a; --dim:#52525b;
    --red:#ef4444; --red2:#dc2626; --red-dk:#b91c1c;
    --commun:#a1a1aa; --peucommun:#2dd4bf; --rare:#818cf8; --epique:#e879f9; --legendaire:#fbbf24;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --st: env(safe-area-inset-top); --sb: env(safe-area-inset-bottom);
    --sl: env(safe-area-inset-left); --sr: env(safe-area-inset-right);
    --tabh: 64px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:var(--bg); color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overscroll-behavior-y:none; -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  button{ font-family:inherit; color:inherit; cursor:pointer; border:none; background:none; }
  input,textarea,select{ font-family:inherit; color:inherit; }
  input,textarea{ user-select:text; }
  svg{ display:block; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#2a2a2e; border-radius:8px; }

  .icon{ width:22px; height:22px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* ---------- Header ---------- */
  header.top{
    position:sticky; top:0; z-index:30; background:rgba(11,11,13,.92);
    backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--line);
    padding:calc(var(--st) + 10px) calc(14px + var(--sr)) 8px calc(14px + var(--sl));
  }
  .top-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand .badge{ width:38px; height:38px; border:1px solid var(--line2); border-radius:9px;
    background:var(--panel); display:grid; place-items:center; color:var(--red); flex:none; }
  .brand h1{ margin:0; font:700 13px/1 var(--mono); letter-spacing:.16em; text-transform:uppercase; }
  .brand p{ margin:3px 0 0; font:400 11px/1 var(--mono); color:var(--muted2); }
  .readouts{ display:flex; align-items:center; gap:16px; }
  .ro{ text-align:right; }
  .ro b{ font:700 18px/1 var(--mono); font-variant-numeric:tabular-nums; letter-spacing:.02em; }
  .ro.acc b{ color:var(--red); }
  .ro span{ display:block; margin-top:4px; font:400 9px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--muted2); }
  .ro.hide-s{ display:none; }
  .prog{ margin-top:9px; height:5px; border-radius:5px; background:#232327; overflow:hidden; }
  .prog>i{ display:block; height:100%; background:var(--red); transition:width .6s ease; }
  .pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px;
    border:1px solid var(--red-dk); background:rgba(239,68,68,.12); color:#fecaca; font:600 12px/1 var(--sans); }

  /* ---------- Layout ---------- */
  main{ padding:14px calc(14px + var(--sr)) calc(var(--tabh) + var(--sb) + 24px) calc(14px + var(--sl)); max-width:900px; margin:0 auto; }
  .muted{ color:var(--muted); } .dim{ color:var(--muted2); }
  .h2{ font:600 11px/1 var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .section{ margin-top:18px; }
  .panel{ border:1px solid var(--line); background:var(--panel2); border-radius:12px; padding:14px; }

  /* ---------- Rareté (échelle + filtres) ---------- */
  .tiles{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  @media(min-width:560px){ .tiles{ grid-template-columns:repeat(6,1fr); } }
  .tile{ border:1px solid var(--line); background:var(--panel2); border-radius:10px; padding:9px 10px; text-align:left; }
  .tile.on{ border-color:var(--line2); background:var(--panel); }
  .tile .lab{ display:flex; align-items:center; gap:6px; }
  .tile .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .tile .lab span{ font:600 10px/1.1 var(--mono); text-transform:uppercase; letter-spacing:.04em; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tile b{ display:block; margin-top:6px; font:700 15px/1 var(--mono); font-variant-numeric:tabular-nums; }
  .tile b i{ color:var(--dim); font-style:normal; }

  /* ---------- Filtres ---------- */
  .filters{ display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
  .search{ position:relative; flex:1 1 100%; }
  .search .icon{ position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted2); width:18px; height:18px; }
  .search input{ width:100%; padding:10px 12px 10px 36px; border:1px solid var(--line); background:var(--panel2);
    border-radius:9px; font-size:14px; }
  .search input::placeholder{ color:var(--dim); }
  select.sel{ padding:10px 12px; border:1px solid var(--line); background:var(--panel2); border-radius:9px; font-size:13px; color:var(--muted); }
  .seg{ display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  .seg button{ padding:10px 12px; font-size:13px; color:var(--muted2); background:var(--panel2); }
  .seg button.on{ background:var(--red2); color:#fff; }
  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--red); }

  /* ---------- Grille voitures ---------- */
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:16px; }
  @media(min-width:520px){ .grid{ grid-template-columns:repeat(3,1fr); } }
  @media(min-width:760px){ .grid{ grid-template-columns:repeat(4,1fr); } }
  .card{ position:relative; border:1px solid var(--line); background:var(--panel); border-radius:11px; overflow:hidden; text-align:left; transition:transform .12s ease, border-color .12s ease; }
  .card:active{ transform:scale(.98); }
  .card.have{ border-color:#3f3f46; }
  .card.flash{ animation:flash 1.4s ease; }
  @keyframes flash{ 0%,100%{ box-shadow:0 0 0 0 transparent; } 20%{ box-shadow:0 0 0 3px var(--rr, var(--red)); } }
  .thumb{ position:relative; aspect-ratio:4/3; background:#0e0e10; display:grid; place-items:center; overflow:hidden; }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .thumb .glyph{ opacity:.16; color:#fff; }
  .thumb .lock{ position:absolute; color:#52525b; }
  .cdot{ position:absolute; left:8px; top:8px; width:10px; height:10px; border-radius:50%; box-shadow:0 0 0 2px var(--bg); }
  .cflag{ position:absolute; right:8px; top:6px; font-size:15px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.6)); }
  .cchk{ position:absolute; right:8px; bottom:8px; width:20px; height:20px; border-radius:50%; background:var(--red2); display:grid; place-items:center; box-shadow:0 0 0 2px var(--bg); }
  .cchk .icon{ width:13px; height:13px; color:#fff; stroke-width:3; }
  .cmeta{ padding:9px 10px; }
  .cmeta .rr{ font:600 9px/1 var(--mono); letter-spacing:.06em; text-transform:uppercase; }
  .cmeta .nm{ margin:4px 0 2px; font:600 13px/1.15 var(--sans); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cmeta .nm.miss{ color:var(--muted2); }
  .cmeta .br{ font:400 11px/1.2 var(--sans); color:var(--muted2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .count-line{ margin:14px 2px 0; font:400 12px/1 var(--mono); color:var(--muted2); }

  /* progress rails (marques/pays) */
  .rail-row{ display:block; text-align:left; width:100%; }
  .rail-head{ display:flex; justify-content:space-between; gap:8px; font:400 12px/1.4 var(--mono); }
  .rail-head .l{ color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rail-head .v{ color:var(--muted2); flex:none; }
  .rail-head .v.done{ color:var(--legendaire); }
  .rail{ height:4px; border-radius:4px; background:#232327; overflow:hidden; margin-top:4px; }
  .rail>i{ display:block; height:100%; background:var(--dim); border-radius:4px; transition:width .5s ease; }
  .rail>i.done{ background:var(--legendaire); }
  .rail-grid{ display:grid; grid-template-columns:1fr; gap:11px 22px; }
  @media(min-width:560px){ .rail-grid{ grid-template-columns:1fr 1fr; } }
  @media(min-width:820px){ .rail-grid{ grid-template-columns:1fr 1fr 1fr; } }
  .link-btn{ font:400 12px/1 var(--mono); color:var(--muted2); }
  .link-btn:active{ color:var(--txt); }

  /* stats */
  .stat-cards{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  @media(min-width:560px){ .stat-cards{ grid-template-columns:repeat(4,1fr); } }
  .stat{ border:1px solid var(--line); background:var(--panel2); border-radius:11px; padding:13px; }
  .stat b{ font:700 22px/1 var(--mono); font-variant-numeric:tabular-nums; }
  .stat span{ display:block; margin-top:6px; font:400 10px/1.2 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:var(--muted2); }
  .bars{ display:flex; flex-direction:column; gap:9px; }
  .barrow{ display:grid; grid-template-columns:96px 1fr 44px; align-items:center; gap:10px; }
  .barrow .k{ display:flex; align-items:center; gap:7px; font:600 11px/1 var(--mono); text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }
  .barrow .k .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .barrow .track{ height:8px; border-radius:6px; background:#232327; overflow:hidden; }
  .barrow .track>i{ display:block; height:100%; border-radius:6px; transition:width .5s ease; }
  .barrow .n{ text-align:right; font:600 12px/1 var(--mono); font-variant-numeric:tabular-nums; color:var(--muted); }
  .spark{ display:flex; align-items:flex-end; gap:6px; height:80px; }
  .spark .col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0; }
  .spark .bar{ width:100%; max-width:34px; background:var(--red-dk); border-radius:4px 4px 0 0; min-height:3px; transition:height .5s ease; }
  .spark .cl{ font:400 9px/1 var(--mono); color:var(--muted2); white-space:nowrap; }
  .recent{ display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
  .recent .r{ flex:none; width:110px; }
  .recent .r .ph{ width:110px; height:82px; border-radius:9px; overflow:hidden; border:1px solid var(--line); background:#0e0e10; display:grid; place-items:center; }
  .recent .r .ph img{ width:100%; height:100%; object-fit:cover; }
  .recent .r .nm{ margin-top:6px; font:600 11px/1.2 var(--sans); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .recent .r .dt{ font:400 10px/1.2 var(--mono); color:var(--muted2); }

  /* trophies */
  .badges{ display:grid; grid-template-columns:repeat(2,1fr); gap:9px; }
  @media(min-width:600px){ .badges{ grid-template-columns:repeat(3,1fr); } }
  .bg{ display:flex; align-items:center; gap:11px; border:1px solid var(--line); background:var(--panel2); border-radius:11px; padding:12px; }
  .bg.on{ border-color:rgba(251,191,36,.4); background:rgba(251,191,36,.05); }
  .bg .ic{ width:38px; height:38px; border-radius:9px; display:grid; place-items:center; flex:none; background:#26262a; color:var(--dim); }
  .bg.on .ic{ background:rgba(251,191,36,.16); color:var(--legendaire); }
  .bg .t{ min-width:0; }
  .bg .t b{ display:block; font:600 13px/1.2 var(--sans); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bg.off .t b{ color:var(--muted2); }
  .bg .t span{ font:400 11px/1.3 var(--sans); color:var(--muted2); }

  /* settings */
  .rows{ display:flex; flex-direction:column; }
  .srow{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); }
  .srow:last-child{ border-bottom:none; }
  .srow .l b{ display:block; font:600 14px/1.2 var(--sans); }
  .srow .l span{ font:400 12px/1.3 var(--sans); color:var(--muted2); }
  .btn{ padding:10px 14px; border-radius:9px; font:600 13px/1 var(--sans); border:1px solid var(--line2); background:var(--panel); color:var(--txt); white-space:nowrap; }
  .btn:active{ background:#1f1f22; }
  .btn.red{ background:var(--red2); border-color:var(--red2); color:#fff; }
  .btn.red:active{ background:var(--red-dk); }
  .btn.ghost{ background:transparent; }
  .btn:disabled{ opacity:.4; }
  .meter{ height:8px; border-radius:6px; background:#232327; overflow:hidden; margin-top:8px; }
  .meter>i{ display:block; height:100%; background:var(--red); }

  /* ---------- Tab bar ---------- */
  nav.tabs{
    position:fixed; left:0; right:0; bottom:0; z-index:30; height:calc(var(--tabh) + var(--sb));
    padding-bottom:var(--sb); background:rgba(11,11,13,.94); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); display:grid; grid-template-columns:repeat(5,1fr); align-items:center;
  }
  nav.tabs button{ display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted2); height:100%; justify-content:center; }
  nav.tabs button.on{ color:var(--txt); }
  nav.tabs button span{ font:500 9px/1 var(--sans); letter-spacing:.02em; }
  .fab{ position:relative; }
  .fab>i{ width:52px; height:52px; margin-top:-18px; border-radius:16px; background:var(--red2); box-shadow:0 8px 20px rgba(220,38,38,.35);
    display:grid; place-items:center; color:#fff; }
  .fab>i .icon{ width:26px; height:26px; stroke-width:2.4; }
  .fab:active>i{ transform:scale(.94); }

  /* ---------- Overlays / sheets ---------- */
  .scrim{ position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.72); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; }
  @media(min-width:600px){ .scrim{ align-items:center; padding:16px; } }
  .sheet{ width:100%; max-width:560px; max-height:92vh; background:var(--panel); border:1px solid var(--line2); border-radius:16px 16px 0 0; display:flex; flex-direction:column; overflow:hidden; }
  @media(min-width:600px){ .sheet{ border-radius:16px; } }
  .sheet .sh-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .sheet .sh-head h3{ margin:0; font:600 14px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; }
  .sheet .sh-body{ padding:16px; overflow-y:auto; padding-bottom:calc(16px + var(--sb)); }
  .sheet .sh-foot{ display:flex; gap:10px; padding:14px 16px calc(14px + var(--sb)); border-top:1px solid var(--line); }
  .iconbtn{ width:34px; height:34px; border-radius:999px; display:grid; place-items:center; color:var(--muted); }
  .iconbtn:active{ background:#1f1f22; color:#fff; }

  .src-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .src{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; aspect-ratio:1; border:2px dashed var(--line2); border-radius:12px; background:var(--panel2); color:var(--muted); }
  .src:active{ border-color:var(--red); color:var(--txt); }
  .src .icon{ width:30px; height:30px; }
  .src small{ font:500 13px/1.2 var(--sans); text-align:center; }

  .cam{ position:relative; border-radius:12px; overflow:hidden; background:#000; aspect-ratio:3/4; display:grid; place-items:center; }
  .cam video{ width:100%; height:100%; object-fit:cover; }
  .cam .shutter{ position:absolute; bottom:14px; left:50%; transform:translateX(-50%); width:64px; height:64px; border-radius:50%; background:#fff; box-shadow:0 0 0 4px rgba(255,255,255,.25); }
  .cam .shutter:active{ transform:translateX(-50%) scale(.92); }
  .cam .err{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:24px; text-align:center; color:var(--muted); font-size:13px; }

  .preview{ position:relative; border-radius:12px; overflow:hidden; border:1px solid var(--line2); }
  .preview img{ width:100%; max-height:260px; object-fit:cover; display:block; }
  .preview .re{ position:absolute; bottom:10px; right:10px; display:flex; gap:8px; }
  .preview .re button{ padding:7px 12px; border-radius:8px; background:rgba(11,11,13,.82); font:600 12px/1 var(--sans); color:#fff; }

  .field{ position:relative; margin-top:10px; }
  .field .icon{ position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted2); width:18px; height:18px; }
  .field input, .field textarea{ width:100%; padding:11px 12px 11px 36px; border:1px solid var(--line); background:var(--panel2); border-radius:9px; font-size:14px; }
  .field textarea{ resize:vertical; min-height:64px; padding-top:11px; }
  .field input::placeholder, .field textarea::placeholder{ color:var(--dim); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gpsbtn{ display:flex; align-items:center; gap:8px; margin-top:10px; padding:10px 12px; border:1px solid var(--line); border-radius:9px; background:var(--panel2); color:var(--muted); font:500 13px/1 var(--sans); width:100%; justify-content:center; }
  .gpsbtn.set{ color:var(--peucommun); border-color:rgba(45,212,191,.4); }

  .picklist{ border:1px solid var(--line); border-radius:9px; overflow:hidden; max-height:230px; overflow-y:auto; margin-top:8px; }
  .pick{ display:flex; align-items:center; gap:9px; width:100%; padding:10px 12px; text-align:left; border-bottom:1px solid var(--line); }
  .pick:last-child{ border-bottom:none; }
  .pick.on{ background:rgba(220,38,38,.18); }
  .pick .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .pick .tx{ min-width:0; flex:1; }
  .pick .tx b{ display:block; font:500 13px/1.2 var(--sans); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pick .tx span{ font:400 10px/1.2 var(--mono); text-transform:uppercase; letter-spacing:.04em; color:var(--muted2); }
  .pick .tag{ font:600 9px/1 var(--mono); padding:3px 5px; border-radius:5px; background:rgba(45,212,191,.18); color:var(--peucommun); flex:none; }

  .detail-hero{ position:relative; aspect-ratio:4/3; background:#0e0e10; display:grid; place-items:center; }
  .detail-hero img{ width:100%; height:100%; object-fit:cover; }
  .thumbstrip{ display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:4px; }
  .thumbstrip .ts{ position:relative; width:64px; height:48px; border-radius:7px; overflow:hidden; border:2px solid transparent; flex:none; }
  .thumbstrip .ts.cover{ border-color:var(--red); }
  .thumbstrip .ts img{ width:100%; height:100%; object-fit:cover; }
  .thumbstrip .add{ width:64px; height:48px; border-radius:7px; border:1px dashed var(--line2); display:grid; place-items:center; color:var(--muted2); flex:none; }
  .specs{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:14px; }
  .spec{ border:1px solid var(--line); background:var(--panel2); border-radius:9px; padding:9px 11px; }
  .spec dt{ font:400 9px/1 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:var(--dim); }
  .spec dd{ margin:5px 0 0; font:500 13px/1.2 var(--sans); display:flex; align-items:center; gap:6px; }
  .chip{ display:inline-flex; align-items:center; gap:7px; padding:5px 10px; border-radius:999px; font:600 10px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; }

  /* ---- Fiche swipeable (carrousel photo ↔ fiche technique) ---- */
  .pager{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; overscroll-behavior-x:contain; }
  .pager::-webkit-scrollbar{ display:none; }
  .page{ flex:0 0 100%; min-width:100%; scroll-snap-align:start; scroll-snap-stop:always; padding:16px 18px 8px; box-sizing:border-box; }
  .dots{ display:flex; justify-content:center; gap:8px; padding:10px 0 2px; }
  .dot{ width:8px; height:8px; border-radius:999px; border:0; padding:0; background:var(--line); cursor:pointer; transition:all .25s ease; }
  .dot.on{ width:22px; background:var(--red); }
  .swipe-hint{ display:flex; align-items:center; justify-content:center; gap:6px; margin:6px 0 12px; font:500 11px/1 var(--mono); letter-spacing:.04em; color:var(--dim); transition:opacity .3s ease; }
  .swipe-hint .icon{ width:13px; height:13px; }
  .detail-title{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-top:14px; }
  .detail-title h2{ margin:0; font:700 19px/1.2 var(--sans); }
  .detail-title .muted{ margin:4px 0 0; font-size:14px; }

  // Store "spots" : un enregistrement par voiture collectée.
  // Repli mémoire si IndexedDB indisponible (ex. aperçu sandbox) → l'app tourne quand même.
  const Store = (() => {
    const DB = "garage-manifest", STORE = "spots", VER = 1;
    let db = null, mem = null;

    function open() {
      return new Promise((resolve) => {
        if (mem) return resolve();
        let req;
        try { req = indexedDB.open(DB, VER); }
        catch { mem = new Map(); return resolve(); }
        req.onupgradeneeded = () => { const d = req.result; if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath:"carId" }); };
        req.onsuccess = () => { db = req.result; resolve(); };
        req.onerror = () => { mem = new Map(); resolve(); };
      });
    }
    const tx = (mode) => db.transaction(STORE, mode).objectStore(STORE);
    const wrap = (r) => new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });

    return {
      open,
      isMemory: () => !!mem,
      async all()   { if (mem) return [...mem.values()]; return wrap(tx("readonly").getAll()); },
      async put(v)  { if (mem) { mem.set(v.carId, v); return; } return wrap(tx("readwrite").put(v)); },
      async del(id) { if (mem) { mem.delete(id); return; } return wrap(tx("readwrite").delete(id)); },
      async clear() { if (mem) { mem.clear(); return; } return wrap(tx("readwrite").clear()); },
    };
  })();

  // Réduit une image (fichier OU blob) à une vignette JPEG, orientation EXIF respectée.
  async function toThumb(source, max = 1280, quality = 0.78) {
    let bmp;
    try { bmp = await createImageBitmap(source, { imageOrientation:"from-image" }); }
    catch {
      bmp = await new Promise((res, rej) => {
        const img = new Image(); img.onload = () => res(img); img.onerror = rej;
        img.src = URL.createObjectURL(source);
      });
    }
    const w = bmp.width, h = bmp.height, scale = Math.min(1, max / Math.max(w, h));
    const cw = Math.round(w * scale), ch = Math.round(h * scale);
    const c = document.createElement("canvas"); c.width = cw; c.height = ch;
    c.getContext("2d").drawImage(bmp, 0, 0, cw, ch);
    if (bmp.close) bmp.close();
    return c.toDataURL("image/jpeg", quality);
  }

     Valeur embarquée : l'app reconnaît les voitures dès l'installation, sans configuration
     manuelle — indispensable pour la faire tester par des tiers.
     META.ai n'est PAS la valeur courante : c'est une SURCHARGE locale. Vide => on prend le défaut.
     Conséquence voulue : changer cette seule ligne migre tout le monde au prochain déploiement,
     alors qu'une valeur pré-écrite en base épinglerait chaque utilisateur sur l'ancienne URL. */
  const AI_ENDPOINT_DEFAULT = "https://silent-firefly-2620.cyril-lapopin.workers.dev";
  const resolveAiEndpoint = () => ((META.ai || "").trim() || AI_ENDPOINT_DEFAULT);

  /* ---- Métadonnées persistées (missions, équipage, réglages avancés) ---- */
  let META = { carId:"__meta__", bonus:0, missions:{}, friends:[], feed:[], name:"", ai:"" };
  async function saveMeta(){ try { await Store.put(META); } catch {} }

  const RANKS = [
    { min:0,    name:"Novice" },
    { min:60,   name:"Spotter" },
    { min:180,  name:"Chasseur" },
    { min:450,  name:"Pilote" },
    { min:1000, name:"Élite" },
    { min:2200, name:"Légende du bitume" },
  ];
  function rankOf(score){
    let i = 0; while (i+1 < RANKS.length && score >= RANKS[i+1].min) i++;
    const cur = RANKS[i], next = RANKS[i+1] || null;
    return { i, name:cur.name, next, pct: next ? Math.min(100, Math.round((score-cur.min)/(next.min-cur.min)*100)) : 100 };
  }

  // Rang de rareté tolérant : une entrée importée avec un `r` hors référentiel ne doit plus
  // faire planter un tri (DT-03). Le nettoyage à l'import reste la première ligne de défense.
  const rRank = (r) => (RARITY[r] ? RARITY[r].rank : 0);
  const has = (id) => state.spots.has(id);
  const cover = (rec) => rec && rec.photos && rec.photos.length ? rec.photos[Math.min(rec.cover||0, rec.photos.length-1)] : null;

  /* ====================================================== STATS DÉRIVÉES */
  function computeStats() {
    const collected = CARS.filter(c => has(c.id));
    const count = collected.length;
    const score = collected.reduce((n,c) => n + RARITY[c.r].pts, 0) + (META.bonus||0);

    const byRarity = {}; RARITY_ORDER.forEach(k => byRarity[k] = { have:0, total:0 });
    const brandMap = {}, countryMap = {}, catMap = {};
    for (const c of CARS) {
      byRarity[c.r].total++;
      (brandMap[c.brand]   ??= { have:0, total:0, flag:c.c }).total++;
      (countryMap[c.c]     ??= { have:0, total:0 }).total++;
      (catMap[c.cat]       ??= { have:0, total:0 }).total++;
      if (has(c.id)) { byRarity[c.r].have++; brandMap[c.brand].have++; countryMap[c.c].have++; catMap[c.cat].have++; }
    }
    const brandList = Object.entries(brandMap).map(([brand,v]) => ({ brand, ...v, pct:v.have/v.total }))
      .sort((a,b) => b.pct-a.pct || b.have-a.have || a.brand.localeCompare(b.brand));
    const countryList = Object.entries(countryMap).map(([flag,v]) => ({ flag, name:COUNTRY[flag]||flag, ...v, pct:v.have/v.total }))
      .sort((a,b) => b.pct-a.pct || b.have-a.have);
    const catList = Object.entries(catMap).map(([cat,v]) => ({ cat, ...v })).sort((a,b) => b.have-a.have || a.cat.localeCompare(b.cat));

    // rareté maxi collectée
    let rarest = null;
    for (const c of collected) if (!rarest || RARITY[c.r].rank > RARITY[rarest.r].rank) rarest = c;

    // récents
    const recent = collected
      .map(c => ({ car:c, rec:state.spots.get(c.id) }))
      .sort((a,b) => new Date(b.rec.at) - new Date(a.rec.at))
      .slice(0, 8);

    // photos max sur une voiture
    let maxPhotos = 0; for (const r of state.spots.values()) maxPhotos = Math.max(maxPhotos, (r.photos||[]).length);

    // timeline 6 derniers mois
    const now = new Date(); const months = [];
    for (let i = 5; i >= 0; i--) { const d = new Date(now.getFullYear(), now.getMonth()-i, 1); months.push({ key:`${d.getFullYear()}-${d.getMonth()}`, label:d.toLocaleDateString("fr-FR",{month:"short"}), count:0 }); }
    const mIdx = Object.fromEntries(months.map((m,i) => [m.key, i]));
    for (const r of state.spots.values()) { const d = new Date(r.at); const k = `${d.getFullYear()}-${d.getMonth()}`; if (k in mIdx) months[mIdx[k]].count++; }

    const brandsTouched = brandList.filter(b => b.have>0).length;
    const countriesTouched = countryList.filter(c => c.have>0).length;
    const hasFullBrand = brandList.some(b => b.have===b.total);

    const sctx = { count, brandsTouched, countriesTouched, byRarity, hasFullBrand, maxPhotos, courseHave:(catMap["Course"]||{have:0}).have, hyperHave:(catMap["Hypercar"]||{have:0}).have };
    const badges = BADGES.map(b => ({ ...b, earned: b.test(sctx) }));

    return { count, score, rank:rankOf(score), pct:Math.round(count/TOTAL*100), byRarity, brandList, countryList, catList, rarest, recent, months, brandsTouched, countriesTouched, badges, earned:badges.filter(b=>b.earned).length };
  }

  /* ====================================================== HELPERS RENDU */
  const $ = (s, r=document) => r.querySelector(s);
  const escapeHtml = (s) => String(s||"").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
  const fmtDate = (iso) => { try { return new Date(iso).toLocaleDateString("fr-FR",{ day:"2-digit", month:"short", year:"numeric" }); } catch { return ""; } };
  const rColor = (r) => RARITY[r].color;

  const brands = ["all", ...[...new Set(CARS.map(c => c.brand))].sort((a,b)=>a.localeCompare(b))];
  const countries = ["all", ...Object.keys(COUNTRY).filter(f => CARS.some(c => c.c===f))];
  const cats = ["all", ...[...new Set(CARS.map(c => c.cat))].sort((a,b)=>a.localeCompare(b))];

  function visibleCars() {
    const q = state.q.trim().toLowerCase();
    // Les « Non classé » ne rejoignent la grille QUE sur recherche explicite (DT-19).
    // Hors recherche, elles fausseraient les compteurs de complétude, qui portent par
    // définition sur les 927 entrées du catalogue officiel.
    const pool = q ? [...CARS, ...customCars().filter(c => state.spots.has(c.id))] : CARS;
    return pool.filter(c => {
      if (state.brand!=="all" && c.brand!==state.brand) return false;
      if (state.country!=="all" && c.c!==state.country) return false;
      if (state.rarity!=="all" && c.r!==state.rarity) return false;
      if (state.cat!=="all" && c.cat!==state.cat) return false;
      const h = has(c.id);
      if (state.status==="have" && !h) return false;
      if (state.status==="missing" && h) return false;
      if (q && !(`${c.brand} ${c.model}`.toLowerCase().includes(q))) return false;
      return true;
    }).sort((a,b) => {
      if (state.sort==="brand") return a.brand.localeCompare(b.brand) || a.model.localeCompare(b.model);
      if (state.sort==="az") return a.model.localeCompare(b.model);
      return rRank(b.r)-rRank(a.r) || a.brand.localeCompare(b.brand) || a.model.localeCompare(b.model); // rareté
    });
  }

  /* ====================================================== RENDU: HEADER + TABS */
  function renderChrome(st) {
    $("#brandIcon").innerHTML = icon("car");
    $("#readouts").innerHTML =
      ro(`${st.count}/${TOTAL}`, "repérées") +
      ro(`${st.pct}%`, "complet", true) +
      ro(st.score.toLocaleString("fr-FR"), "points", false, true) +
      ro(String(st.byRarity.legendaire.have), "légendes", false, true);
    $("#progbar").style.width = st.pct + "%";

    const tabs = [
      ["defis","flag","Défis"],
      ["collection","car","Garage"],
      ["__fab__","plus",""],
      ["favoris","star","Favoris"],
      ["plus","more","Plus"],
    ];
    const PLUS_PAGES = new Set(["plus","map","stats","trophies","settings"]);
    $("#tabs").innerHTML = tabs.map(([k,ic,lbl]) => {
      if (k==="__fab__") return `<button class="fab" data-fab="1" aria-label="Ajouter une prise"><i>${icon(ic)}</i></button>`;
      const on = (k==="plus" ? PLUS_PAGES.has(state.tab) : state.tab===k) ? " on" : "";
      return `<button class="${on.trim()}" data-tab="${k}">${icon(ic)}<span>${lbl}</span></button>`;
    }).join("");
  }
  const ro = (v,l,acc,hide) => `<div class="ro${acc?" acc":""}${hide?" hide-s":""}"><b>${v}</b><span>${l}</span></div>`;

  /* ====================================================== RENDU: VUES */
  function render() {
    const st = computeStats();
    renderChrome(st);
    const v = $("#view");
    if (!state.ready) { v.innerHTML = `<div class="empty"><p class="s" style="font-family:var(--mono)">Chargement du manifeste…</p></div>`; return; }
    if (state.tab==="collection") v.innerHTML = viewCollection(st) + unclassedHTML();
    else if (state.tab==="defis") v.innerHTML = rankMissionsHTML(st);
    else if (state.tab==="favoris") v.innerHTML = viewFavorites(st);
    else if (state.tab==="plus") v.innerHTML = viewPlus();
    else if (state.tab==="map") { v.innerHTML = subBackHTML("Carte de chasse") + viewMap(); initHuntMap(); }
    else if (state.tab==="stats") v.innerHTML = subBackHTML("Statistiques & équipage") + viewStats(st) + crewHTML(st);
    else if (state.tab==="trophies") v.innerHTML = subBackHTML("Trophées") + viewTrophies(st);
    else if (state.tab==="settings") v.innerHTML = subBackHTML("Réglages") + viewSettings(st) + extraSettingsHTML();
    if (state.tab==="settings") { refreshStorageInfo(); markSWCurrent(); }
    window.scrollTo({ top:0 });
  }

  function tile(on, key, label, have, total, color) {
    return `<button class="tile${on?" on":""}" data-rarity="${key}">
      <div class="lab"><span class="dot" style="background:${color}"></span><span>${label}</span></div>
      <b>${have}<i>/${total}</i></b></button>`;
  }

  function subBackHTML(title) {
    return `<button class="subback" data-tab="plus">${icon("chevronleft","icon")}<span>${escapeHtml(title)}</span></button>`;
  }

  function viewFavorites(st) {
    const favs = [...state.spots.values()]
      .filter(r => r.carId!=="__meta__" && r.favorite && CARS_BY_ID[r.carId])
      .sort((a,b) => new Date(b.at||0) - new Date(a.at||0));
    if (!favs.length) {
      return `<div class="empty">${icon("star")}<p class="t">Aucune trouvaille favorite</p><p class="s">Depuis la fiche d'une voiture, appuie sur l'étoile pour la marquer comme favorite — tes plus belles prises, réunies ici.</p></div>`;
    }
    return `
      <div class="count-line">${favs.length} trouvaille${favs.length>1?"s":""} favorite${favs.length>1?"s":""}</div>
      <div class="grid">${favs.map(r => carCard(CARS_BY_ID[r.carId])).join("")}</div>`;
  }

  function viewPlus() {
    const items = [
      ["map","map","Carte de chasse","Tes prises géolocalisées sur une carte"],
      ["stats","chart","Statistiques & équipage","Progression, classement, fil d'activité"],
      ["trophies","trophy","Trophées","Badges et objectifs de collection"],
      ["settings","sliders","Réglages","Pilote, IA, sauvegarde, installation"],
    ];
    return `
      <div class="section panel plus-menu">
        ${items.map(([k,ic,lbl,sub]) => `
          <button class="plus-row" data-tab="${k}">
            <span class="pi">${icon(ic,"icon")}</span>
            <span class="tx"><b>${lbl}</b><small>${sub}</small></span>
            <span class="chev">${icon("chevronleft","icon")}</span>
          </button>`).join("")}
      </div>`;
  }

  function viewCollection(st) {
    const tiles = tile(state.rarity==="all","all","Tous",st.count,TOTAL,"var(--red)")
      + RARITY_ORDER.map(k => tile(state.rarity===k,k,RARITY[k].label,st.byRarity[k].have,st.byRarity[k].total,RARITY[k].color)).join("");

    const brandRails = (state.brandsOpen ? st.brandList : st.brandList.slice(0,9)).map(b => rail(b.flag+" "+b.brand, b.have, b.total, "brand", b.brand)).join("");
    const countryRails = (state.countriesOpen ? st.countryList : st.countryList.slice(0,6)).map(c => rail(c.flag+" "+c.name, c.have, c.total, "country", c.flag)).join("");

    return `
      <div class="tiles">${tiles}</div>

      <div class="section panel">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div class="h2">Complétude par marque</div>
          <button class="link-btn" data-toggle="brands">${state.brandsOpen?"Réduire":`Voir les ${st.brandList.length} marques`}</button>
        </div>
        <div class="rail-grid" style="margin-top:12px">${brandRails}</div>
      </div>

      <div class="section panel">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div class="h2">Complétude par pays</div>
          <button class="link-btn" data-toggle="countries">${state.countriesOpen?"Réduire":`Voir les ${st.countryList.length} pays`}</button>
        </div>
        <div class="rail-grid" style="margin-top:12px">${countryRails}</div>
      </div>

      <div class="filters">
        <div class="search">${icon("search")}<input id="q" placeholder="Rechercher marque ou modèle…" value="${escapeHtml(state.q)}" /></div>
        <select class="sel" id="brandSel">${brands.map(b=>`<option value="${escapeHtml(b)}"${state.brand===b?" selected":""}>${b==="all"?"Toutes marques":escapeHtml(b)}</option>`).join("")}</select>
        <select class="sel" id="catSel">${cats.map(c=>`<option value="${escapeHtml(c)}"${state.cat===c?" selected":""}>${c==="all"?"Tous types":escapeHtml(c)}</option>`).join("")}</select>
        <select class="sel" id="sortSel">
          <option value="rarity"${state.sort==="rarity"?" selected":""}>Tri : rareté</option>
          <option value="brand"${state.sort==="brand"?" selected":""}>Tri : marque</option>
          <option value="az"${state.sort==="az"?" selected":""}>Tri : A→Z</option>
        </select>
        <div class="seg">
          ${[["all","Toutes"],["have","Au garage"],["missing","Manquantes"]].map(([v,l])=>`<button data-status="${v}" class="${state.status===v?"on":""}">${l}</button>`).join("")}
        </div>
      </div>

      <div id="collectionResults">${collectionResultsHTML()}</div>
    `;
  }

  function collectionResultsHTML() {
    const list = visibleCars();
    const count = state.spots.size;
    const cards = list.length
      ? `<div class="grid">${list.map(carCard).join("")}</div>`
      : `<div class="empty">${icon("search")}<p class="t">Aucune voiture ne correspond</p><p class="s">Ajuste les filtres, ou pars en repérage et enregistre une prise avec le bouton +.</p></div>`;
    return `<div class="count-line">${list.length} affichée${list.length>1?"s":""} · ${count} au garage · ${TOTAL} au total</div>${cards}`;
  }

  function rail(label, have, total, kind, val) {
    const done = have===total && total>0;
    const pct = total ? Math.round(have/total*100) : 0;
    return `<button class="rail-row" data-filter="${kind}" data-val="${escapeHtml(val)}">
      <div class="rail-head"><span class="l">${escapeHtml(label)}</span><span class="v${done?" done":""}">${done?"✓ ":""}${have}/${total}</span></div>
      <div class="rail"><i class="${done?"done":""}" style="width:${pct}%"></i></div>
    </button>`;
  }

  function carCard(c) {
    const h = has(c.id), rec = state.spots.get(c.id), ph = cover(rec);
    const col = rColor(c.r);
    const visual = ph
      ? `<img src="${ph}" alt="${escapeHtml(c.model)}" loading="lazy" />`
      : h
        ? `<svg viewBox="0 0 24 24" class="icon glyph" style="width:40px;height:40px;color:${col}">${P.car}</svg>`
        : `<svg viewBox="0 0 24 24" class="icon glyph" style="width:44px;height:44px">${P.car}</svg><svg viewBox="0 0 24 24" class="icon lock" style="width:16px;height:16px">${P.lock}</svg>`;
    const flash = state.flash===c.id ? " flash" : "";
    return `<button class="card${h?" have":""}${flash}" data-car="${c.id}" style="--rr:${col}">
      <div class="thumb">
        ${visual}
        <span class="cdot" style="background:${col}"></span>
        <span class="cflag">${c.c}</span>
        ${h?`<span class="cchk">${icon("check")}</span>`:""}
        ${rec?.favorite ? `<span class="cfav">${icon("star")}</span>` : ""}
      </div>
      <div class="cmeta">
        <div class="rr" style="color:${col}">${RARITY[c.r].label}</div>
        <div class="nm${h?"":" miss"}">${escapeHtml(c.model)}</div>
        <div class="br">${escapeHtml(c.brand)} · ${escapeHtml(c.cat)}</div>
      </div>
    </button>`;
  }

  function viewStats(st) {
    const bars = RARITY_ORDER.map(k => {
      const r = st.byRarity[k], pct = r.total ? Math.round(r.have/r.total*100) : 0;
      return `<div class="barrow"><div class="k"><span class="dot" style="background:${RARITY[k].color}"></span>${RARITY[k].label}</div>
        <div class="track"><i style="width:${pct}%;background:${RARITY[k].color}"></i></div><div class="n">${r.have}/${r.total}</div></div>`;
    }).join("");

    const maxMonth = Math.max(1, ...st.months.map(m => m.count));
    const spark = st.months.map(m => `<div class="col"><div class="bar" style="height:${Math.round(m.count/maxMonth*100)}%"></div><div class="cl">${m.label.replace(".","")}</div></div>`).join("");

    const cats = st.catList.map(c => `<div class="barrow"><div class="k" style="text-transform:none;letter-spacing:0">${escapeHtml(c.cat)}</div>
      <div class="track"><i style="width:${Math.round(c.have/c.total*100)}%;background:var(--dim)"></i></div><div class="n">${c.have}/${c.total}</div></div>`).join("");

    const recent = st.recent.length ? st.recent.map(({car,rec}) => {
      const ph = cover(rec);
      return `<button class="r" data-car="${car.id}">
        <div class="ph">${ph?`<img src="${ph}" />`:`<svg viewBox="0 0 24 24" class="icon glyph" style="width:28px;height:28px;color:${rColor(car.r)}">${P.car}</svg>`}</div>
        <div class="nm">${escapeHtml(car.model)}</div><div class="dt">${fmtDate(rec.at)}</div></button>`;
    }).join("") : `<p class="dim" style="font-size:13px">Rien encore. Enregistre ta première prise avec le bouton +.</p>`;

    const rarest = st.rarest ? `<div class="stat" style="grid-column:span 2">
        <span>Plus belle prise</span>
        <b style="font-size:16px;font-family:var(--sans);color:${rColor(st.rarest.r)}">${escapeHtml(st.rarest.brand)} ${escapeHtml(st.rarest.model)}</b>
        <div class="dim" style="font-size:11px;margin-top:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">${RARITY[st.rarest.r].label} · ${st.rarest.c}</div>
      </div>` : "";

    return `
      <div class="stat-cards">
        <div class="stat"><b>${st.count}</b><span>repérées</span></div>
        <div class="stat"><b>${st.pct}%</b><span>complété</span></div>
        <div class="stat"><b>${st.score.toLocaleString("fr-FR")}</b><span>points</span></div>
        <div class="stat"><b>${st.earned}<i style="color:var(--dim);font-style:normal">/${BADGES.length}</i></b><span>trophées</span></div>
        <div class="stat"><b>${st.brandsTouched}<i style="color:var(--dim);font-style:normal">/${brands.length-1}</i></b><span>marques</span></div>
        <div class="stat"><b>${st.countriesTouched}<i style="color:var(--dim);font-style:normal">/${countries.length-1}</i></b><span>pays</span></div>
        ${rarest}
      </div>

      <div class="section panel"><div class="h2" style="margin-bottom:14px">Par rareté</div><div class="bars">${bars}</div></div>
      <div class="section panel"><div class="h2" style="margin-bottom:14px">Prises · 6 derniers mois</div><div class="spark">${spark}</div></div>
      <div class="section"><div class="h2" style="margin-bottom:12px">Prises récentes</div><div class="recent">${recent}</div></div>
      <div class="section panel"><div class="h2" style="margin-bottom:14px">Par catégorie</div><div class="bars">${cats}</div></div>
    `;
  }

  function viewTrophies(st) {
    return `<div class="section" style="margin-top:4px">
      <div class="h2" style="margin-bottom:12px">Trophées · ${st.earned}/${BADGES.length}</div>
      <div class="badges">${st.badges.map(b => `<div class="bg ${b.earned?"on":"off"}"><div class="ic">${icon(b.ic)}</div>
        <div class="t"><b>${escapeHtml(b.label)}</b><span>${escapeHtml(b.desc)}</span></div></div>`).join("")}</div></div>`;
  }

  function viewSettings(st) {
    const installRow = installPrompt
      ? `<div class="srow"><div class="l"><b>Installer l'application</b><span>Ajoute Garage à ton écran d'accueil</span></div><button class="btn red" data-act="install">Installer</button></div>`
      : `<div class="srow"><div class="l"><b>Installer l'application</b><span id="installHint">${window.matchMedia("(display-mode: standalone)").matches ? "Déjà installée ✓" : "Menu du navigateur → « Ajouter à l'écran d'accueil »"}</span></div></div>`;

    return `
      <div class="section panel">
        <div class="h2" style="margin-bottom:6px">Sauvegarde</div>
        <div class="rows">
          <div class="srow"><div class="l"><b>Exporter ma collection</b><span>Fichier .json (photos incluses) — ta sauvegarde</span></div><button class="btn" data-act="export">${icon("download","icon")}</button></div>
          <div class="srow"><div class="l"><b>Importer une sauvegarde</b><span>Restaure depuis un fichier .json</span></div><button class="btn" data-act="import">${icon("upload","icon")}</button></div>
        </div>
      </div>

      <div class="section panel">
        <div class="h2" style="margin-bottom:6px">Application</div>
        <div class="rows">
          ${installRow}
          <div class="srow"><div class="l"><b>Envoyer un retour</b><span>Bug, idée, ressenti — inclut la version pour que je m'y retrouve</span></div><button class="btn" data-act="feedback">${icon("upload","icon")}</button></div>
          <div class="srow"><div class="l"><b>Stockage utilisé</b><span id="storeInfo">Calcul…</span></div></div>
          <div class="srow"><div class="l"><b>Mode hors-ligne</b><span id="swInfo">Vérification…</span></div></div>
        </div>
        <div class="meter"><i id="storeMeter" style="width:0%"></i></div>
      </div>

      <div class="section panel">
        <div class="h2" style="margin-bottom:6px">Zone sensible</div>
        <div class="rows">
          <div class="srow"><div class="l"><b>Réinitialiser le garage</b><span>Efface toutes tes prises et photos. Irréversible.</span></div><button class="btn red ghost" data-act="reset" style="color:var(--red);border-color:var(--red-dk)">${icon("trash","icon")}</button></div>
        </div>

        Garage Manifest v${APP_VERSION}<br>

        Reconnaissance photo auto → point de branchement <b style="color:var(--muted2)">identifyCar()</b>
      </p>
    `;
  }

  /* ---------- Rapprochement flou texte → catalogue (aucune IA nécessaire ici) ---------- */
  function normalizeText(s) {
    return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  }
  function bigrams(s) { const out = []; for (let i=0;i<s.length-1;i++) out.push(s.slice(i,i+2)); return out; }
  function diceCoefficient(a, b) {
    if (!a || !b) return 0;
    if (a===b) return 1;
    const ba = bigrams(a), bb = bigrams(b);
    if (!ba.length || !bb.length) return 0;
    const map = new Map();
    for (const bg of ba) map.set(bg, (map.get(bg)||0)+1);
    let matches = 0;
    for (const bg of bb) { const c = map.get(bg); if (c>0) { matches++; map.set(bg, c-1); } }
    return (2*matches) / (ba.length+bb.length);
  }
  function matchCatalog(brandGuess, modelGuess, aiConfidence) {
    const qBrand = normalizeText(brandGuess), qFull = normalizeText(`${brandGuess||""} ${modelGuess||""}`);
    if (!qFull) return null;
    let best = null;
    for (const c of [...CARS, ...customCars()]) {
      const brandNorm = normalizeText(c.brand), full = normalizeText(`${c.brand} ${c.model}`);
      const modelSim = diceCoefficient(qFull, full);
      const brandBonus = qBrand && (brandNorm===qBrand || brandNorm.includes(qBrand) || qBrand.includes(brandNorm)) ? 0.3 : 0;
      const score = Math.min(1, modelSim*0.7 + brandBonus);
      if (!best || score > best.score) best = { id:c.id, score };
    }
    if (!best || best.score < 0.32) return null; // seuil anti faux-positifs
    const conf = Math.round(best.score * (0.55 + 0.45 * Math.max(0, Math.min(1, aiConfidence ?? 0.6))) * 100) / 100;
    return { id: best.id, confidence: conf };
  }

  /* ====================================================== POINT DE BRANCHEMENT IA */
  // Contrat relais : POST {image: dataURL} → [{brand, model, confidence}] (texte libre).
  // Le rapprochement avec les IDs du catalogue se fait ici, côté client, via matchCatalog —
  // le relais reste générique et n'a jamais besoin de connaître le catalogue.
  // Renseigne un motif d'échec lisible : sans ça, timeout / relais HS / réponse malformée
  // et « voiture non reconnue » produisaient tous le même silence, rendant tout diagnostic
  // terrain impossible (DT-07).
  let lastAiError = null;
  async function identifyCar(thumbDataUrl) {
    lastAiError = null;
    const url = resolveAiEndpoint();
    if (!/^https:\/\//.test(url)) { lastAiError = "Aucun relais IA valide — saisie manuelle"; return []; }
    try {
      const ctl = new AbortController(); const t = setTimeout(() => ctl.abort(), 15000);
      let res;
      try { res = await fetch(url, { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ image: thumbDataUrl }), signal:ctl.signal }); }
      finally { clearTimeout(t); }
      if (!res.ok) { lastAiError = `Relais IA indisponible (HTTP ${res.status})`; return []; }
      const guesses = await res.json();
      if (!Array.isArray(guesses)) { lastAiError = "Réponse du relais IA inattendue"; return []; }
      const matched = new Map();
      for (const g of guesses) {
        if (!g || (!g.brand && !g.model)) continue;
        const m = matchCatalog(g.brand, g.model, typeof g.confidence==="number" ? g.confidence : 0.6);
        if (m && (!matched.has(m.id) || matched.get(m.id) < m.confidence)) matched.set(m.id, m.confidence);
      }
      return [...matched.entries()].map(([id,confidence]) => ({ id, confidence })).sort((a,b) => b.confidence-a.confidence).slice(0,3);
    } catch (e) {
      lastAiError = (e && e.name === "AbortError")
        ? "Relais IA : délai dépassé (15 s)"
        : "Relais IA injoignable — hors ligne ?";
      return [];
    }
  }

  /* ====================================================== OVERLAYS */
  const overlay = $("#overlay");
  let activeDetail = null;
  function closeOverlay() { stopCamera(); overlay.innerHTML = ""; document.body.style.overflow = ""; }
  function openSheet(html) {
    overlay.innerHTML = `<div class="scrim" data-scrim="1"><div class="sheet">${html}</div></div>`;
    document.body.style.overflow = "hidden";
  }

  /* ---------- Capture (caméra + galerie) ---------- */
  let stream = null, draft = null;
  function stopCamera() { if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } }

  function openCapture(lockCarId) {
    const rec = lockCarId ? state.spots.get(lockCarId) : null;
    draft = {
      lockCar: lockCarId || null,
      photo: null,
      carId: lockCarId || null,
      q: "",
      candidates: [],
      loc: rec?.loc || "",
      coords: rec?.coords || null,
      note: rec?.note || "",
      when: rec?.at ? new Date(rec.at).toISOString().slice(0,10) : new Date().toISOString().slice(0,10),
      step: "source",
    };
    renderCapture();
  }

    const title = draft.lockCar ? "Ajouter une photo" : "Enregistrer une prise";

  }

        ? `<div class="spec" style="margin-top:4px"><dt>Modèle</dt><dd>${CARS_BY_ID[draft.lockCar].c} ${escapeHtml(CARS_BY_ID[draft.lockCar].brand)} ${escapeHtml(CARS_BY_ID[draft.lockCar].model)}</dd></div>`

      body.innerHTML = `

          <img src="${draft.photo}" alt="prise" />

            <button data-cap="camera">${icon("camera","icon")}</button>

        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        ${draft.queue && draft.queue.length ? `<p style="color:var(--muted);font:600 12px/1.3 var(--mono);margin:12px 0 0">${icon("image","icon")} Lot en cours — encore ${draft.queue.length} photo${draft.queue.length>1?"s":""} après celle-ci</p>` : ""}
        ${draft.candidates.length ? `<p style="color:var(--peucommun);font:600 12px/1.3 var(--mono);margin:12px 0 0">Proposition automatique — vérifie et confirme.</p>` : ""}
        <div style="margin-top:12px">${picker}</div>
        <div id="varZone">${variantChipsHTML()}</div>
        <div class="grid2" style="margin-top:10px">
          <div class="field">${icon("pin")}<input id="loc" placeholder="Lieu — ex. Monaco…" value="${escapeHtml(draft.loc)}" /></div>
          <div class="field">${icon("calendar")}<input id="when" type="date" max="${new Date().toISOString().slice(0,10)}" value="${draft.when}" /></div>
        </div>
        <button class="gpsbtn ${draft.coords?"set":""}" data-act="gps">${icon("gps","icon")}<span id="gpsLbl">${draft.coords?`Position enregistrée (${draft.coords.lat.toFixed(3)}, ${draft.coords.lng.toFixed(3)})`:"Ajouter ma position GPS"}</span></button>
        <div class="field">${icon("info")}<textarea id="note" placeholder="Note (couleur, détail, série limitée…)">${escapeHtml(draft.note)}</textarea></div>
        <div class="sh-foot" style="margin:16px -16px calc(-16px - var(--sb)); padding-left:16px;padding-right:16px">
          <button class="btn" data-close="1" style="flex:1">Annuler</button>
          <button class="btn red" data-act="save" style="flex:2" ${draft.carId?"":"disabled"}>${icon("check","icon")}&nbsp; ${draft.lockCar||has(draft.carId)?"Enregistrer":"Ajouter au garage"}</button>
        </div>

  function pickItemsHTML() {
    const needle = draft.q.trim().toLowerCase();
    const list = [...CARS, ...customCars()].filter(c => !needle || `${c.brand} ${c.model}`.toLowerCase().includes(needle))
      .sort((a,b) => {
        const ca = draft.candidates.includes(a.id)?0:1, cb = draft.candidates.includes(b.id)?0:1;
        return ca-cb || rRank(b.r)-rRank(a.r) || a.brand.localeCompare(b.brand);
      }).slice(0, 80);
    return list.map(c => {
      const cand = draft.candidates.includes(c.id), h = has(c.id), sel = draft.carId===c.id;
      return `<button class="pick${sel?" on":""}" data-pick="${c.id}">
        <span class="dot" style="background:${c.custom?"var(--dim)":rColor(c.r)}"></span>
        <span class="tx"><b>${c.c} ${escapeHtml(c.brand)} ${escapeHtml(c.model)}</b><span>${c.custom?"Non classé":RARITY[c.r].label+" · "+escapeHtml(c.cat)}</span></span>
        ${cand?`<span class="tag">IA</span>`:""}
        ${(h||sel)?icon("check","icon"):""}
      </button>`;
    }).join("");
  }
  function customZoneHTML() {
    if (!draft.showCustom) {
      return `<button class="notfound-cta" data-act="showcustomform">${icon("plus","icon")}&nbsp; Voiture introuvable dans le catalogue ? Enregistre-la en « Non classé »</button>`;
    }
    return `
      <div class="custom-form">
        <p style="font:600 12px/1.4 var(--mono);color:var(--muted);margin:0 0 10px">Hors catalogue — elle rejoindra la catégorie « Non classé »</p>

          <div class="field">${icon("car")}<input id="cBrand" placeholder="Marque — ex. Renault" maxlength="40" /></div>

  function variantChipsHTML() {
    const vars = (typeof VARIANTS !== "undefined" && draft.carId) ? VARIANTS[draft.carId] : null;
    if (!vars) return "";
    if (draft.variantsFor !== draft.carId) { // changement de modèle → repartir des déclinaisons déjà enregistrées
      const rec = state.spots.get(draft.carId);
      draft.variants = new Set(rec && Array.isArray(rec.variants) ? rec.variants : []);
      draft.variantsFor = draft.carId;
    }
    return `
      <div class="var-wrap">
        <div class="h3">Déclinaison repérée (optionnel)</div>
        <div class="var-chips">${vars.map(v => `<button class="vchip${draft.variants.has(v)?" on":""}" data-var="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join("")}</div>
      </div>`;

  function modelPickerHTML() {
    return `
      <div class="search">${icon("search")}<input id="pickQ" placeholder="Quel modèle ?" value="${escapeHtml(draft.q)}" /></div>
      <div class="picklist" id="pickList">${pickItemsHTML()}</div>
      <div id="customZone">${customZoneHTML()}</div>`;
  }

  async function startCamera() {
    const wrap = $("#camWrap"), video = $("#cam");
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:"environment" } }, audio:false });
      video.srcObject = stream;
      await video.play().catch(()=>{});
    } catch (e) {
      if (wrap) wrap.innerHTML = `<div class="err">${icon("camera","icon")}<div>Accès à l'appareil photo indisponible.<br>Autorise la caméra, ou utilise l'import galerie.</div>
        <button class="btn" data-cap="gallery">${icon("image","icon")}&nbsp; Importer une photo</button></div>`;
    }
  }

  async function shoot() {
    const video = $("#cam"); if (!video || !video.videoWidth) return;
    const max = 1280, w = video.videoWidth, h = video.videoHeight, scale = Math.min(1, max/Math.max(w,h));
    const c = document.createElement("canvas"); c.width = Math.round(w*scale); c.height = Math.round(h*scale);
    c.getContext("2d").drawImage(video, 0, 0, c.width, c.height);
    stopCamera();
    draft.photo = c.toDataURL("image/jpeg", 0.82);
    await afterPhoto();
  }

  async function afterPhoto() {
    draft.candidates = [];
    draft.step = "form";
    renderCaptureBody();
    if (draft.lockCar) return; // voiture déjà verrouillée (ajout de photo depuis une fiche) : pas de reconnaissance
    try {
      const cands = await identifyCar(draft.photo);
      const valid = cands.filter(c => CARS_BY_ID[c.id] && !CARS_BY_ID[c.id].custom);
      if (valid.length) showRecogPopup(valid[0]);
      else if (lastAiError) toast(lastAiError); // silence volontaire si le relais a répondu sans trouver
    } catch {}
  }

  /* ---------- Popup de reconnaissance photo ---------- */
  function showRecogPopup(cand) {
    const c = CARS_BY_ID[cand.id]; if (!c) return;
    const pct = typeof cand.confidence === "number" ? Math.round(cand.confidence * (cand.confidence <= 1 ? 100 : 1)) : null;
    const w = document.createElement("div");
    w.id = "recogWrap";
    w.innerHTML = `
      <div class="rc-card">
        <div class="rc-k">${icon("search","icon")} Modèle trouvé</div>
        <div class="rc-name">${c.c} ${escapeHtml(c.brand)} ${escapeHtml(c.model)}</div>
        ${pct!==null ? `<div class="rc-conf">Confiance de reconnaissance : ${pct}%</div>` : ""}
        <div class="rc-actions">
          <button class="btn red" data-recog="yes">${icon("check","icon")}&nbsp; Oui, c'est elle</button>
          <button class="btn" data-recog="no">Ce n'est pas mon véhicule</button>
        </div>
      </div>`;
    document.body.appendChild(w);
    w.addEventListener("click", (e) => {
      if (e.target !== w && !e.target.closest("[data-recog]")) return;
      const act = e.target.closest("[data-recog]")?.dataset.recog;
      if (act === "yes") { draft.carId = cand.id; draft.candidates = [cand.id]; }
      // "no" ou clic hors carte : on laisse le champ de recherche du formulaire ouvert pour une saisie manuelle
      w.remove();
      renderCaptureBody();
      if (act === "yes") { const el = document.querySelector(`[data-pick="${cand.id}"]`); if (el) el.scrollIntoView({block:"nearest"}); }
      else { const q = $("#pickQ"); if (q) q.focus(); }
    });
  }

  async function handleFile(file) {
    if (!file) return;
    try { draft.photo = await toThumb(file); await afterPhoto(); }
    catch { toast("Image illisible"); }
  }

  async function saveDraft() {
    if (!draft.carId) return;
    const id = draft.carId;
    const prev = state.spots.get(id);
    const photos = prev ? [...(prev.photos||[])] : [];
    if (draft.photo) { if (draft.lockCar) photos.push(draft.photo); else photos.unshift(draft.photo); }
    const rec = {
      carId: id,
      at: new Date(draft.when + "T12:00:00").toISOString(),
      loc: draft.loc.trim(),
      coords: draft.coords,
      note: draft.note.trim(),
      photos,
      cover: prev ? (prev.cover||0) : 0,
      variants: (draft.variantsFor === id && draft.variants) ? [...draft.variants] : (prev?.variants || []),
      favorite: prev?.favorite || false,
    };
    await Store.put(rec);
    state.spots.set(id, rec);
    state.flash = id;
    const isNew = !prev;

    // Import par lot : on enchaîne sans fermer
    if (draft.queue && draft.queue.length) {
      const f = draft.queue.shift();
      draft.carId = null; draft.photo = null; draft.note = ""; draft.candidates = []; draft.q = "";
      toast(`${CARS_BY_ID[id].model} ajoutée ✓ · reste ${draft.queue.length + 1}`);
      await handleFile(f);
      checkMissions();
      return;
    }

    closeOverlay();
    render();
    if (isNew) showReveal(id); else toast("Fiche mise à jour");
    checkMissions();
    setTimeout(() => { if (state.flash === id) { state.flash = null; render(); } }, 1500); // sinon la classe .flash restait collée (DT-18)
  }

      ${(typeof VARIANTS !== "undefined" && VARIANTS[c.id]) ? `

    pages.push(infoPageHTML(c, rec, h));
    const multi = pages.length > 1;

    openSheet(`
      <div class="sh-head"><h3>${escapeHtml(c.model)}</h3><button class="iconbtn" data-close="1">${icon("x")}</button></div>
      <div class="sh-body" style="padding:0">

        ${multi ? `<div class="dots" id="dots">${pages.map((_,i) => `<button class="dot${i===0?" on":""}" data-dot="${i}"></button>`).join("")}</div>

  /* ====================================================== EXPORT / IMPORT */
  // Un dataURL importé est injecté tel quel dans 7 attributs src : sans ce filtre, une
  // sauvegarde forgée obtient une exécution de script, persistée en base (DT-02).
  const PHOTO_RE = /^data:image\/(jpeg|png|webp);base64,[A-Za-z0-9+/]+={0,2}$/;
  const sanitizePhotos = (arr) => (Array.isArray(arr) ? arr : [])
    .filter(p => typeof p === "string" && p.length <= 12e6 && PHOTO_RE.test(p));

  // Une entrée custom dont `r` ou `cat` sort du référentiel fait planter le tri du sélecteur,
  // et l'erreur survit au redémarrage puisqu'elle est persistée avant tout rendu (DT-03).
  function sanitizeCustomCar(raw) {
    if (!raw || typeof raw !== "object") return null;
    const id = String(raw.id || "");
    if (!id.startsWith("custom:") || id.length > 120) return null;
    const brand = String(raw.brand || "").trim().slice(0,40);
    const model = String(raw.model || "").trim().slice(0,50);
    if (!brand || !model) return null;
    return { id, brand, model, yr:String(raw.yr || "").trim().slice(0,20),
             c:"🏳️", cat:"Non classé",
             r: RARITY_ORDER.includes(raw.r) ? raw.r : "commun", custom:true };
  }
  function sanitizeSpot(rec) {
    if (!rec || typeof rec !== "object" || !CARS_BY_ID[rec.carId]) return null;
    const at = (rec.at && !isNaN(new Date(rec.at).getTime())) ? rec.at : new Date().toISOString();
    const co = rec.coords;
    const coords = (co && typeof co.lat === "number" && typeof co.lng === "number"
                    && Math.abs(co.lat) <= 90 && Math.abs(co.lng) <= 180) ? { lat:co.lat, lng:co.lng } : null;
    const photos = sanitizePhotos(rec.photos);
    return {
      carId: rec.carId, at, coords, photos,
      loc:  String(rec.loc  || "").slice(0,120),
      note: String(rec.note || "").slice(0,2000),
      cover: Math.max(0, Math.min(Number(rec.cover) || 0, Math.max(0, photos.length - 1))),
      variants: (Array.isArray(rec.variants) ? rec.variants : []).filter(v => typeof v === "string").slice(0,20),
      favorite: !!rec.favorite,
    };
  }

  async function exportJSON() {
    // `ai` est exclu : c'est l'URL du relais, donc en pratique son seul contrôle d'accès.
    // Une sauvegarde s'échange par WhatsApp — elle ne doit pas la transporter (DT-14).
    const data = { app:"garage-manifest", version:1, exportedAt:new Date().toISOString(), spots:[...state.spots.values()], meta:{ ...META, ai:"" }, custom:{ ...CUSTOM_REG } };
    const blob = new Blob([JSON.stringify(data)], { type:"application/json" });
    const url = URL.createObjectURL(blob), a = document.createElement("a");
    a.href = url; a.download = `garage-manifest-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast("Sauvegarde exportée");
  }
  function importJSON() {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = async () => {
      const file = inp.files?.[0]; if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (data.custom && Array.isArray(data.custom.list)) { // les « Non classé » d'abord, sinon leurs prises seraient rejetées
          for (const raw of data.custom.list) {
            const c = sanitizeCustomCar(raw); if (!c) continue;
            if (!CUSTOM_REG.list.some(x => x.id === c.id)) CUSTOM_REG.list.push(c);
            CARS_BY_ID[c.id] = c;
          }
          await Store.put(CUSTOM_REG);
        }
        const spots = Array.isArray(data.spots) ? data.spots : [];
        let n = 0, rejected = 0;
        for (const rec of spots) {
          const clean = sanitizeSpot(rec);
          if (!clean) { rejected++; continue; }
          await Store.put(clean); state.spots.set(clean.carId, clean); n++;
        }
        toast(`${n} voiture${n>1?"s":""} importée${n>1?"s":""}${rejected?` · ${rejected} entrée${rejected>1?"s":""} rejetée${rejected>1?"s":""}`:""}`);
        if (data.meta && typeof data.meta === "object") {
          // `ai` volontairement ignoré : un fichier importé ne doit pas pouvoir rerouter
          // silencieusement les photos vers un serveur tiers.
          const m = data.meta;
          META = { ...META,
            bonus:    Number(m.bonus) || META.bonus || 0,
            missions: (m.missions && typeof m.missions === "object") ? m.missions : META.missions,
            friends:  Array.isArray(m.friends) ? m.friends : META.friends,
            feed:     Array.isArray(m.feed) ? m.feed.slice(0,50) : META.feed,
            name:     String(m.name || META.name || "").slice(0,24),
            carId:"__meta__" };
          await saveMeta();
        }
        render();
      } catch { toast("Fichier invalide"); }
    };
    inp.click();
  }
  async function resetAll() {
    if (!await askConfirm("Effacer TOUTES tes prises et photos ? Cette action est irréversible.", "Tout effacer", true)) return;
    await Store.clear();
    state.spots.clear();
    // La base était vidée mais pas la mémoire (DT-06) : le bonus de missions survivait au reset
    // et les « Non classé » réapparaissaient dans le sélecteur, leurs prises ayant disparu.
    for (const c of CUSTOM_REG.list) delete CARS_BY_ID[c.id];
    CUSTOM_REG = { carId:"__customcars__", list:[] };
    META = { carId:"__meta__", bonus:0, missions:{}, friends:[], feed:[], name:"", ai:"" };
    state.flash = null;
    // Les caches du service worker ne sont PAS purgés : ils contiennent la coquille applicative.
    // Les effacer hors ligne rendrait l'app inaccessible. Le reset porte sur les données, pas sur l'app.
    toast("Garage réinitialisé");
    render();
  }

  /* ====================================================== MISSIONS HEBDO */
  // Le numéro de semaine était calculé en UTC alors que la fenêtre de comptage (weekBounds)
  // est locale : les deux divergeaient les nuits dimanche/lundi selon le fuseau, ce qui
  // réinitialisait ou recréditait un défi hebdo au mauvais moment (DT-08).
  // On dérive désormais la clé du MÊME lundi local que la fenêtre.
  function weekKey(d = new Date()) {
    const [start] = weekBounds(d);                                                   // lundi local 00:00
    const th = new Date(start.getFullYear(), start.getMonth(), start.getDate() + 3); // jeudi ISO
    const y = th.getFullYear();
    // Écart calculé sur des dates UTC normalisées : immunise contre les changements d'heure.
    const w = Math.floor((Date.UTC(y, th.getMonth(), th.getDate()) - Date.UTC(y, 0, 1)) / 864e5 / 7) + 1;
    return `${y}-S${String(w).padStart(2,"0")}`;
  }
  function weekBounds(d = new Date()) {
    const day = (d.getDay()||7) - 1;
    const start = new Date(d.getFullYear(), d.getMonth(), d.getDate() - day);
    const end = new Date(start); end.setDate(end.getDate()+7);
    return [start, end];
  }
  function mulberry32(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  function hashStr(s){ let h=2166136261; for (let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

  function dayKey(d = new Date()) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function dayBounds(d = new Date()) {
    const s = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const e = new Date(s); e.setDate(e.getDate()+1);
    return [s, e];
  }
  function pickMissions(pool, seedKey, howMany) {
    const rnd = mulberry32(hashStr(seedKey));
    const p = [...pool], picked = [];
    while (picked.length < howMany && p.length) picked.push(p.splice(Math.floor(rnd()*p.length), 1)[0]);
    return picked;
  }
  function missionsFor(kind) {
    const key = kind==="day" ? dayKey() : weekKey();
    const [ws, we] = kind==="day" ? dayBounds() : weekBounds();
    const picked = pickMissions(kind==="day" ? DAILY_POOL : WEEKLY_POOL, key, kind==="day" ? 2 : 3);
    const spots = [...state.spots.values()].filter(r => r.carId!=="__meta__" && r.at && new Date(r.at) >= ws && new Date(r.at) < we);
    const done = (META.missions[key] ||= []);
    return picked.map(m => {
      const target = Math.max(1, Math.round(m.w[0] + (m.w[1]-m.w[0]) * mulberry32(hashStr(key+m.id))()));
      const matching = spots.filter(r => { const c = CARS_BY_ID[r.carId]; return c && m.t(c, r); });
      let prog;
      if (m.mode==="pts") prog = matching.reduce((n,r) => n + RARITY[CARS_BY_ID[r.carId].r].pts, 0);
      else if (m.mode==="brands") prog = new Set(matching.map(r => CARS_BY_ID[r.carId].brand)).size;
      else if (m.mode==="flags") prog = new Set(matching.map(r => CARS_BY_ID[r.carId].c)).size;
      else prog = matching.length;
      const bonus = Math.max(3, Math.round(m.b * target));
      return { key, mid:m.id, label:m.lbl(target), target, prog:Math.min(prog,target), bonus, done:done.includes(m.id), complete:prog>=target };
    });
  }
  async function checkMissions() {
    const dk = dayKey(), wk = weekKey();
    for (const k of Object.keys(META.missions)) if (k!==dk && k!==wk) delete META.missions[k]; // purge historique (bonus déjà crédités)
    let gained = 0;
    for (const m of [...missionsFor("day"), ...missionsFor("week")]) {
      const done = (META.missions[m.key] ||= []);
      if (m.complete && !m.done) { done.push(m.mid); META.bonus = (META.bonus||0) + m.bonus; gained += m.bonus; toast(`Défi accompli : ${m.label} · +${m.bonus} pts`); }
    }
    if (gained) { await saveMeta(); render(); }
  }
  function missionRow(m) {
    return `
      <div class="mission${m.done||m.complete?" done":""}">
        <div class="st">${m.done||m.complete ? icon("check","icon") : `<span style="font:700 11px/1 var(--mono)">${m.prog}/${m.target}</span>`}</div>
        <div class="tx"><b>${m.label}</b></div>
        <div class="bn">+${m.bonus} pts</div>
      </div>`;
  }
  function rankMissionsHTML(st) {
    const r = st.rank;
    const daily = missionsFor("day").map(missionRow).join("");
    const weekly = missionsFor("week").map(missionRow).join("");
    return `
      <div class="section panel rankbar">
        <div class="medal">${icon("crown","icon")}</div>
        <div style="flex:1;min-width:0">
          <b>${r.name}</b>

  let leafletReady = null, huntMap = null;
  function ensureLeaflet() {
    if (window.L) return Promise.resolve();
    if (leafletReady) return leafletReady;
    leafletReady = new Promise((res, rej) => {
      const css = document.createElement("link");
      css.rel = "stylesheet"; css.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
      document.head.appendChild(css);
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
      s.onload = res; s.onerror = () => { leafletReady = null; rej(new Error("offline")); };
      document.head.appendChild(s);
    });

  function viewMap() {

  async function makeShareCard(carId) {
    const c = CARS_BY_ID[carId], rec = state.spots.get(carId); if (!c || !rec) return;
    const col = rColor(c.r), ph = cover(rec), st = computeStats();
    const W = 1080, H = 1350, cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const x = cv.getContext("2d");
    x.fillStyle = "#0b0b0d"; x.fillRect(0,0,W,H);
    function wrapTxt(ctx, text, tx, ty, maxW, lh) {
      const words = text.split(" "); let line = "", y = ty;
      for (const wd of words) { const t = line ? line+" "+wd : wd; if (ctx.measureText(t).width > maxW && line) { ctx.fillText(line, tx, y); line = wd; y += lh; } else line = t; }
      ctx.fillText(line, tx, y);
    }
    const drawRest = () => {
      x.strokeStyle = col; x.lineWidth = 10; x.strokeRect(24,24,W-48,H-48);
      x.fillStyle = col; x.font = "700 34px monospace"; x.textAlign = "left";
      x.fillText(RARITY[c.r].label.toUpperCase(), 70, 880);
      x.fillStyle = "#ffffff"; x.font = "800 72px system-ui"; wrapTxt(x, `${c.brand} ${c.model}`, 70, 960, W-140, 80);
      x.fillStyle = "#9a9aa3"; x.font = "400 34px system-ui";
      x.fillText(`${c.cat} · ${c.yr}`, 70, 1110);
      if (rec.loc) x.fillText(`Vu à ${rec.loc.slice(0,32)}`, 70, 1160);
      x.fillStyle = col; x.font = "800 52px monospace"; x.textAlign = "right";
      x.fillText(`+${RARITY[c.r].pts} PTS`, W-70, 1115);
      x.fillStyle = "#55555e"; x.font = "600 26px monospace"; x.textAlign = "left";
      x.fillText(`GARAGE MANIFEST — ${(META.name||"PILOTE").toUpperCase()} · ${st.rank.name.toUpperCase()} · ${st.score} PTS`, 70, H-64);
      cv.toBlob(async (blob) => {
        const file = new File([blob], `garage-${c.id}.png`, { type:"image/png" });
        if (navigator.canShare && navigator.canShare({ files:[file] })) { try { await navigator.share({ files:[file] }); return; } catch {} }
        const url = URL.createObjectURL(blob), a = document.createElement("a");
        a.href = url; a.download = file.name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        toast("Carte enregistrée");
      }, "image/png");
    };
    if (ph) { const img = new Image(); img.onload = () => {
        const tw = W-140, th = 640;
        let sw = img.width, sh = img.height, sx = 0, sy = 0;
        if (img.width/img.height > tw/th) { sw = sh*(tw/th); sx = (img.width-sw)/2; } else { sh = sw/(tw/th); sy = (img.height-sh)/2; }
        x.save(); x.beginPath(); x.roundRect(70,70,tw,th,24); x.clip(); x.drawImage(img,sx,sy,sw,sh,70,70,tw,th); x.restore();
        drawRest();
      }; img.src = ph; }
    else { x.fillStyle = "#141418"; x.beginPath(); x.roundRect(70,70,W-140,640,24); x.fill(); drawRest(); }
  }
