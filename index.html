  /* ====================================================== PWA */
  // Un service worker « waiting » ne prend la main QUE lorsque tous les onglets sont fermés —
  // ce qui n'arrive quasiment jamais sur une PWA installée. Sans ce bloc, un correctif poussé
  // sur GitHub Pages peut rester invisible des jours chez les testeurs (DT-10).
  // PRÉREQUIS CÔTÉ sw.js : répondre au message { type:"SKIP_WAITING" } par self.skipWaiting().
  let swReloading = false;
  function promptSWUpdate(reg) {
    const w = reg.waiting; if (!w || document.getElementById("swUpdate")) return;
    const el = document.createElement("div");
    el.id = "swUpdate";
    el.innerHTML = `<div class="swu-card">
        <b>Nouvelle version disponible</b>
        <span>Recharge pour l'installer. Tes prises et tes photos ne sont pas touchées.</span>
        <div class="swu-actions">
          <button class="btn" data-swu="later">Plus tard</button>
          <button class="btn red" data-swu="now">Mettre à jour</button>
        </div></div>`;
    el.addEventListener("click", (e) => {
      const b = e.target.closest("[data-swu]"); if (!b) return;
      if (b.dataset.swu === "now") { swReloading = true; w.postMessage({ type:"SKIP_WAITING" }); }
      el.remove();
    });
    document.body.appendChild(el);
    markSW("Mise à jour en attente");
  }
  function registerSW() {
    if (!("serviceWorker" in navigator)) { markSW("Non supporté"); return; }
    if (!/^https?:$/.test(location.protocol)) { markSW("Actif une fois hébergé"); return; }
    // Garde anti-boucle : on ne recharge que si l'utilisateur a explicitement demandé la MAJ.
    navigator.serviceWorker.addEventListener("controllerchange", () => { if (swReloading) location.reload(); });
    navigator.serviceWorker.register("sw.js").then((reg) => {
      markSW("Prêt hors-ligne ✓");
      if (reg.waiting && navigator.serviceWorker.controller) promptSWUpdate(reg);
      reg.addEventListener("updatefound", () => {
        const sw = reg.installing; if (!sw) return;
        sw.addEventListener("statechange", () => {
          // "installed" + contrôleur déjà en place => mise à jour, et non première installation.
          if (sw.state === "installed" && navigator.serviceWorker.controller) promptSWUpdate(reg);
        });
      });
      setInterval(() => { reg.update().catch(() => {}); }, 36e5); // sonde horaire
    }).catch(() => markSW("Indisponible"));
  }
  function markSW(txt) { const e = $("#swInfo"); if (e) e.textContent = txt; }
  function markSWCurrent() {
    if (!("serviceWorker" in navigator)) return markSW("Non supporté");
    if (!/^https?:$/.test(location.protocol)) return markSW("Actif une fois hébergé");
    navigator.serviceWorker.getRegistration().then(r => markSW(r ? "Prêt hors-ligne ✓" : "Actif une fois hébergé")).catch(() => markSW("Indisponible"));
  }

  async function refreshStorageInfo() {
    const info = $("#storeInfo"), meter = $("#storeMeter"); if (!info) return;
    if (navigator.storage?.estimate) {
      try {
        const { usage=0, quota=0 } = await navigator.storage.estimate();
        const mb = (usage/1048576).toFixed(1), q = quota ? (quota/1048576).toFixed(0) : "?";
        info.textContent = `${mb} Mo utilisés${quota?` / ~${q} Mo`:""}${Store.isMemory()?" · (mémoire volatile)":""}`;
        if (meter && quota) meter.style.width = Math.min(100, usage/quota*100) + "%";
      } catch { info.textContent = Store.isMemory() ? "Mémoire volatile (aperçu)" : "—"; }
    } else info.textContent = Store.isMemory() ? "Mémoire volatile (aperçu)" : "—";
  }

  /* ====================================================== DIALOGUES IN-APP */
  // Remplacent confirm()/prompt() : rendu incohérent en PWA plein écran, et supprimés
  // silencieusement par certains navigateurs en mode standalone (DT-20).
  // Overlay dédié (#confirmWrap) et NON #overlay : `release` est déclenchée depuis une fiche
  // déjà ouverte dans #overlay — le réutiliser détruirait la fiche sous la confirmation.
  function askDialog(html, onMount) {
    return new Promise((resolve) => {
      const w = document.createElement("div");
      w.id = "confirmWrap";
      w.innerHTML = `<div class="cf-card">${html}</div>`;
      let done = false;
      const close = (v) => {
        if (done) return; done = true;
        document.removeEventListener("keydown", esc, true);
        w.remove(); resolve(v);
      };
      const esc = (e) => { if (e.key === "Escape") { e.stopPropagation(); close(null); } };
      w.addEventListener("click", (e) => {
        const b = e.target.closest("[data-cf]");
        if (b) return close(b.dataset.cf);
        if (e.target === w) close(null);
      });
      document.addEventListener("keydown", esc, true);
      document.body.appendChild(w);
      if (onMount) onMount(w, close);
    });
  }
  async function askConfirm(message, okLabel = "Confirmer", danger = false) {
    const v = await askDialog(`
      <p class="cf-msg">${escapeHtml(message)}</p>
      <div class="cf-actions">
        <button class="btn" data-cf="0">Annuler</button>
        <button class="btn${danger ? " red" : ""}" data-cf="1">${escapeHtml(okLabel)}</button>
      </div>`);
    return v === "1";
  }
  async function askText(message, placeholder = "", value = "") {
    let input = null;
    const v = await askDialog(`
      <p class="cf-msg">${escapeHtml(message)}</p>
      <input id="cfInput" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(value)}" maxlength="60" />
      <div class="cf-actions">
        <button class="btn" data-cf="0">Annuler</button>
        <button class="btn red" data-cf="1">Valider</button>
      </div>`, (w, close) => {
        input = w.querySelector("#cfInput");
        if (input) {
          input.focus();
          input.addEventListener("keydown", (e) => { if (e.key === "Enter") close("1"); });
        }
      });
    if (v !== "1") return null;
    return input ? input.value : "";
  }

  /* ====================================================== TOAST */
  let toastT = null;
  function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2200); }

  /* ====================================================== ÉVÉNEMENTS (délégation) */
  document.addEventListener("click", (e) => {
    const t = e.target.closest("[data-tab],[data-fab],[data-rarity],[data-toggle],[data-status],[data-filter],[data-car],[data-close],[data-scrim],[data-cap],[data-pick],[data-var],[data-act],[data-setcover],[data-addphoto],[data-release],[data-dot],[data-favtoggle]");
    if (!t) return;

    if (t.dataset.scrim && e.target === t) return closeOverlay();
    if (t.dataset.close) return closeOverlay();

    if (t.dataset.tab) { state.tab = t.dataset.tab; render(); return; }
    if (t.dataset.fab) { openCapture(null); return; }

    if (t.dataset.rarity) { state.rarity = state.rarity===t.dataset.rarity ? "all" : t.dataset.rarity; render(); return; }
    if (t.dataset.toggle==="brands") { state.brandsOpen = !state.brandsOpen; render(); return; }
    if (t.dataset.toggle==="countries") { state.countriesOpen = !state.countriesOpen; render(); return; }
    if (t.dataset.status) { state.status = t.dataset.status; render(); return; }
    if (t.dataset.filter) { if (t.dataset.filter==="brand") { state.brand = t.dataset.val; } else { state.country = t.dataset.val; } state.tab="collection"; render(); const g=$(".filters"); if(g) g.scrollIntoView({behavior:"smooth",block:"start"}); return; }

    if (t.dataset.car) { openDetail(t.dataset.car); return; }

    if (t.dataset.cap) {
      if (t.dataset.cap==="camera") { draft.step="camera"; renderCaptureBody(); }
      else if (t.dataset.cap==="batch") {
        const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*"; inp.multiple = true;
        inp.onchange = () => { const fs = [...(inp.files||[])]; if (!fs.length) return; draft.queue = fs.slice(1); handleFile(fs[0]); };
        inp.click();
      }
      else { const fi = $("#fileInput"); if (fi) fi.click(); }
      return;
    }
    if (t.dataset.pick) { draft.carId = t.dataset.pick; renderCaptureBody(); return; }
    if (t.dataset.var !== undefined && draft) { const v = t.dataset.var; if (draft.variants.has(v)) draft.variants.delete(v); else draft.variants.add(v); const z=$("#varZone"); if (z) z.innerHTML = variantChipsHTML(); return; }
    if (t.hasAttribute("data-setcover")) { if (activeDetail) setCover(activeDetail, +t.dataset.setcover); return; }
    if (t.dataset.addphoto) { if (activeDetail) { closeOverlay(); openCapture(activeDetail); } return; }
    if (t.hasAttribute("data-dot")) { const pager=$("#pager"); if(pager) pager.scrollTo({ left:+t.dataset.dot*pager.clientWidth, behavior:"smooth" }); return; }
    if (t.dataset.release) { const rid = t.dataset.release; (async () => { if (await askConfirm("Retirer cette voiture du garage ?", "Retirer", true)) release(rid); })(); return; }
    if (t.dataset.favtoggle) { toggleFavorite(t.dataset.favtoggle); return; }

    const act = t.dataset.act;
    if (act==="save") return saveDraft();
    if (act==="gps") return grabGPS();
    if (act==="export") return exportJSON();
    if (act==="import") return importJSON();
    if (act==="reset") return resetAll();
    if (act==="install") return doInstall();
    if (act==="shareprofile") return shareProfile();
    if (act==="feedback") return sendFeedback();
    if (act==="importprofile") return importProfile();
    if (act==="sharecard") { if (activeDetail) makeShareCard(activeDetail); return; }
    if (act==="notif") { if ("Notification" in window) Notification.requestPermission().then(() => render()); return; }
    if (act==="showcustomform") { draft.showCustom = !draft.showCustom; const z=$("#customZone"); if (z) z.innerHTML = customZoneHTML(); const b=$("#cBrand"); if (b) b.focus(); return; }
    if (act==="createcustom") {
      (async () => {
        const car = await createCustomCar($("#cBrand")?.value, $("#cModel")?.value, $("#cYear")?.value);
        if (!car) { toast("Marque et modèle obligatoires"); return; }
        draft.carId = car.id; draft.showCustom = false;
        toast(`${car.brand} ${car.model} créée en « Non classé »`);
        renderCaptureBody();
      })();
      return;
    }
  });

  // shutter caméra
  document.addEventListener("click", (e) => { if (e.target.id === "shutter") shoot(); });

  // saisies (délégation input/change)
  document.addEventListener("input", (e) => {
    const id = e.target.id;
    if (id==="q") { state.q = e.target.value; const r=$("#collectionResults"); if(r) r.innerHTML = collectionResultsHTML(); return; }
    if (id==="pickQ") { draft.q = e.target.value; const list=$("#pickList"); if(list) list.innerHTML = pickItemsHTML(); return; }
    if (id==="loc") { draft.loc = e.target.value; return; }
    if (id==="when") { draft.when = e.target.value; return; }
    if (id==="note") { draft.note = e.target.value; return; }
  });

  document.addEventListener("change", (e) => {
    const id = e.target.id;
    if (id==="brandSel") { state.brand = e.target.value; render(); }
    else if (id==="catSel") { state.cat = e.target.value; render(); }
    else if (id==="sortSel") { state.sort = e.target.value; render(); }
    else if (id==="fileInput") { handleFile(e.target.files?.[0]); }
    else if (id==="crewName") { META.name = e.target.value.trim().slice(0,24); saveMeta(); }
    else if (id==="aiEndpoint") { META.ai = e.target.value.trim(); saveMeta(); }
  });

  document.addEventListener("keydown", (e) => { if (e.key==="Escape") closeOverlay(); });

  /* ====================================================== INSTALL PROMPT */
  window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); installPrompt = e; if (state.tab==="settings") render(); });
  window.addEventListener("appinstalled", () => { installPrompt = null; toast("Application installée ✓"); if (state.tab==="settings") render(); });
  async function doInstall() { if (!installPrompt) return; installPrompt.prompt(); await installPrompt.userChoice; installPrompt = null; render(); }

  /* ====================================================== BOOT */
  async function init() {
    await Store.open();
    try {
      const all = await Store.all();
      for (const rec of all) {
        if (rec.carId === "__meta__") { META = { ...META, ...rec, carId:"__meta__" }; }
        else if (rec.carId === "__customcars__") { CUSTOM_REG = { carId:"__customcars__", list: Array.isArray(rec.list) ? rec.list : [] }; for (const c of CUSTOM_REG.list) CARS_BY_ID[c.id] = c; }
      }
      for (const rec of all) {
        if (rec.carId === "__meta__" || rec.carId === "__customcars__") continue;
        if (CARS_BY_ID[rec.carId]) state.spots.set(rec.carId, rec);
      }
      // Purge des « Non classé » orphelines (créées mais jamais enregistrées, ou prise supprimée)
      const before = CUSTOM_REG.list.length;
      CUSTOM_REG.list = CUSTOM_REG.list.filter(c => state.spots.has(c.id) || (delete CARS_BY_ID[c.id], false));
      if (CUSTOM_REG.list.length !== before) { try { await Store.put(CUSTOM_REG); } catch {} }
    } catch {}
    if (navigator.storage?.persist) { try { await navigator.storage.persist(); } catch {} }
    state.ready = true;
    render();
    registerSW();
  }

  init();
})();
</script>
</body>
</html>
